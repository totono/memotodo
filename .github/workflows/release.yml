name: Release

# v で始まるタグ（例: v1.0.0）を push すると、Windows 向けビルドを作成して
# GitHub Release（ドラフト）に添付する。ドラフトなので内容を確認してから手動で
# 公開する。手動実行（workflow_dispatch）時は Release を作らず、成果物を Actions の
# アーティファクトとしてアップロードする（動作確認用）。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # タグ push のときだけ、タグ名（vX.Y.Z → X.Y.Z）を wails.json の
      # productVersion に注入する。これで exe のファイルバージョンと NSIS
      # インストーラのバージョンがタグと一致する（build/windows/info.json の
      # {{.Info.ProductVersion}} 経由）。タグは vMAJOR.MINOR.PATCH 形式で付けること。
      - name: Inject version from tag
        if: github.ref_type == 'tag'
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          $cfg = Get-Content wails.json -Raw | ConvertFrom-Json
          if (-not $cfg.info) {
            $cfg | Add-Member -NotePropertyName info -NotePropertyValue ([pscustomobject]@{})
          }
          $cfg.info | Add-Member -NotePropertyName productVersion -NotePropertyValue $v -Force
          $cfg | ConvertTo-Json -Depth 32 | Set-Content wails.json -Encoding utf8
          Write-Host "Injected productVersion = $v"

      - name: Build (Windows/amd64, NSIS installer)
        run: wails build -platform windows/amd64 -nsis

      - name: Package portable zip
        shell: pwsh
        run: |
          $dist = "dist"
          New-Item -ItemType Directory -Path $dist | Out-Null
          Copy-Item "build/bin/memotodo.exe" -Destination $dist
          Compress-Archive -Path "$dist/*" -DestinationPath "memotodo-windows-amd64.zip"

      # タグ push: ドラフトの Release を作り、前タグからのコミット/PR で
      # リリースノートを自動生成して成果物を添付する。
      - name: Create draft release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            memotodo-windows-amd64.zip
            build/bin/*-amd64-installer.exe

      # 手動実行: Release は作らず、成果物を Actions のアーティファクトとして保存する。
      - name: Upload build artifacts
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: memotodo-windows-amd64
          path: |
            memotodo-windows-amd64.zip
            build/bin/*-amd64-installer.exe
