<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>MemoTodo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/src/todo.css">
</head>
<body>

<div class="td-app">

  <!-- ヘッダー -->
  <header class="td-header">
    <div class="td-header-inner">
      <div class="td-header-left">
        <span class="td-logo-mark"></span>
        <span class="td-header-title">MemoTodo</span>
      </div>
      <div class="td-header-actions">
        <button class="td-icon-btn td-btn-settings" id="tdBtnSettings" title="設定">
          <i class="bi bi-gear"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- メインコンテンツ -->
  <main class="td-main">
    <div class="td-content">

      <!-- タブ -->
      <div class="td-tabs-row">
        <div class="td-tabs">
          <button class="td-tab active" data-tab="pending">
            タスク一覧
            <span class="td-badge" id="tdBadgePending">0</span>
          </button>
          <button class="td-tab" data-tab="done">完了済み</button>
        </div>
        <div class="td-bulk-delete-bar" id="tdBulkDeleteBar" style="display:none;">
          <button class="td-btn td-btn-ghost-danger td-btn-sm" id="tdBtnBulkDeleteAll">
            <i class="bi bi-trash3"></i> すべて削除
          </button>
        </div>
      </div>

      <!-- クイック入力（未完了タブのみ） -->
      <div class="td-quick-input-wrap" id="tdQuickInputWrap">
        <div class="td-quick-input-label">タスクを登録</div>
        <textarea
          class="td-quick-input"
          id="tdQuickInput"
          rows="1"
          placeholder="メモを入力してEnterで追加（Alt+Enterで改行）"
        ></textarea>
        <div class="td-quick-input-hint">Enter で追加　・　Alt+Enter で改行</div>
      </div>

      <!-- 一覧エリア -->
      <div class="td-list-wrap" id="tdListArea">
        <div class="td-loading" id="tdLoading"><span class="td-spinner"></span></div>
        <div class="td-empty" id="tdEmpty" style="display:none;">タスクはありません</div>
        <div class="td-card" id="tdCard" style="display:none;">
          <div class="td-section-label" id="tdNoDateLabel" style="display:none;">期日なし</div>
          <div class="td-list" id="tdListNoDate"></div>
          <div class="td-separator" id="tdSeparator" style="display:none;">
            <span class="td-separator-line"></span>
            <span class="td-separator-label"><i class="bi bi-calendar3"></i> 期日あり</span>
            <span class="td-separator-line"></span>
          </div>
          <div class="td-list" id="tdListDated"></div>
        </div>
      </div>

    </div>
  </main>

  <!-- 定期タスク：縦タブ -->
  <div class="td-recurring-tab" id="tdRecurringTab">
    <span class="td-recurring-tab-label">定期タスク</span>
    <div class="td-recurring-tab-badges">
      <span class="td-badge-dot td-badge-yellow" id="tdBadgeYellow" style="display:none;">0</span>
      <span class="td-badge-dot td-badge-red" id="tdBadgeRed" style="display:none;">0</span>
    </div>
  </div>

  <!-- 定期タスク：スライドオーバーパネル -->
  <div class="td-recurring-overlay" id="tdRecurringOverlay" style="display:none;"></div>
  <aside class="td-recurring-panel" id="tdRecurringPanel">
    <div class="td-recurring-panel-header">
      <span class="td-panel-title"><i class="bi bi-arrow-repeat"></i> 定期タスク</span>
      <div class="td-recurring-panel-header-actions">
        <button class="td-icon-btn" id="tdBtnRecurringAdd" title="定期タスクを追加">
          <i class="bi bi-plus-lg"></i>
        </button>
        <button class="td-icon-btn" id="tdBtnRecurringNotifySettings" title="定期タスクの通知設定">
          <i class="bi bi-gear"></i>
        </button>
        <button class="td-icon-btn" id="tdBtnRecurringClose" title="閉じる">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
    </div>
    <div class="td-recurring-panel-body" id="tdRecurringPanelBody">
      <div id="tdRecurringAddInline"></div>

      <div class="td-recurring-overdue-block" id="tdRecurringOverdueBlock" style="display:none;">
        <div class="td-recurring-overdue-title">残タスク（前回分が未完了です）</div>
        <div id="tdRecurringOverdueList"></div>
      </div>
      <div class="td-section-label">期日が近い定期タスク</div>
      <div id="tdRecurringCurrentList"></div>
      <div class="td-empty" id="tdRecurringEmpty" style="display:none;">期日が近い定期タスクはありません</div>

      <div class="td-separator">
        <span class="td-separator-line"></span>
        <span class="td-separator-label"><i class="bi bi-list-ul"></i> すべての定期タスク</span>
        <span class="td-separator-line"></span>
      </div>
      <div id="tdRecurringAllList"></div>
      <div class="td-empty" id="tdRecurringAllEmpty" style="display:none;">定期タスクはまだありません</div>
    </div>
  </aside>

  <!-- サイドパネル（メモ／定期タスクの詳細設定：モーダル方式のときに使用） -->
  <div class="td-panel-overlay" id="tdDetailOverlay" style="display:none;"></div>
  <div class="td-detail-modal" id="tdDetailModal" style="display:none;">
    <div class="td-detail-modal-body" id="tdDetailModalBody"></div>
  </div>

  <!-- 定期タスク通知設定モーダル（表示日数） -->
  <div class="td-modal-overlay td-modal-overlay-over-panel" id="tdRecurringNotifyOverlay" style="display:none;"></div>
  <div class="td-modal td-modal-over-panel" id="tdRecurringNotifyModal" style="display:none;">
    <div class="td-modal-header">
      <span class="td-modal-title"><i class="bi bi-gear"></i> 定期タスクの通知設定</span>
      <button class="td-panel-close" id="tdRecurringNotifyClose"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="td-modal-body">
      <div class="td-field">
        <span class="td-label">期日の何日前から表示するか（周期種別ごと）</span>
      </div>
      <div class="td-field">
        <label class="td-label">週ごとのタスク</label>
        <input type="number" class="td-input td-input-sm" id="tdRNotifyWeekly" min="0" max="366">
      </div>
      <div class="td-field">
        <label class="td-label">月ごとのタスク</label>
        <input type="number" class="td-input td-input-sm" id="tdRNotifyMonthly" min="0" max="366">
      </div>
      <div class="td-field">
        <label class="td-label">年ごとのタスク</label>
        <input type="number" class="td-input td-input-sm" id="tdRNotifyYearly" min="0" max="366">
      </div>
    </div>
    <div class="td-modal-footer">
      <button class="td-btn td-btn-secondary" id="tdRecurringNotifyCancel">閉じる</button>
      <button class="td-btn td-btn-primary" id="tdRecurringNotifySave"><i class="bi bi-floppy"></i> 保存</button>
    </div>
  </div>

  <!-- アプリ設定モーダル -->
  <div class="td-modal-overlay" id="tdSettingsOverlay" style="display:none;"></div>
  <div class="td-modal td-modal-settings" id="tdSettingsModal" style="display:none;">
    <div class="td-modal-header">
      <span class="td-modal-title"><i class="bi bi-gear"></i> 設定</span>
      <button class="td-panel-close" id="tdSettingsClose"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="td-modal-body">
      <div class="td-field">
        <label class="td-label">詳細設定の表示方式</label>
        <div class="td-segmented" id="tdSettingsPattern">
          <button type="button" class="td-segmented-btn" data-value="inline">インライン</button>
          <button type="button" class="td-segmented-btn" data-value="modal">モーダル</button>
        </div>
      </div>
      <div class="td-field">
        <label class="td-label">定期通知の時刻</label>
        <div id="tdSettingsNotifyTimes" class="td-notify-times"></div>
        <button type="button" class="td-btn td-btn-ghost td-btn-sm" id="tdSettingsAddTime">
          <i class="bi bi-plus"></i> 時刻を追加
        </button>
      </div>
    </div>
    <div class="td-modal-footer">
      <button class="td-btn td-btn-secondary" id="tdSettingsCancel">閉じる</button>
      <button class="td-btn td-btn-primary" id="tdSettingsSave"><i class="bi bi-floppy"></i> 保存</button>
    </div>
  </div>

  <!-- 通知トースト（リマインダー・定期通知：旧実装の別ウィンドウポップアップを
       単一ウィンドウ内のオーバーレイに置き換えたもの） -->
  <div class="td-toast" id="tdToast" style="display:none;"></div>

</div>

<script src="/src/todo.js" type="module"></script>
</body>
</html>
